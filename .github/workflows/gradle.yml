name: Java CI with Gradle

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: app
          MYSQL_USER: app
          MYSQL_PASSWORD: pass
        ports:
          - 3306:3306
        volumes:
          - ${{ github.workspace }}/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

    steps:
      - uses: actions/checkout@v2

      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: '11'
          distribution: 'adopt'

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            nc -z 127.0.0.1 3306 && exit 0
            sleep 2
          done
          exit 1

      - name: Start SUT
        run: java -jar ./artifacts/app-deadline.jar &
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/app
          SPRING_DATASOURCE_USERNAME: app
          SPRING_DATASOURCE_PASSWORD: pass

      - name: Wait for SUT
        run: |
          for i in {1..30}; do
            nc -z 127.0.0.1 9999 && exit 0
            sleep 2
          done
          exit 1

      - name: Run tests
        run: ./gradlew test --info -Dselenide.headless=true