name: Java CI with Gradle

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: app
          MYSQL_USER: app
          MYSQL_PASSWORD: pass
        ports:
          - 3306:3306
        volumes:
          - ${{ github.workspace }}/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v2

      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: '11'
          distribution: 'adopt'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL..."
          sleep 30
          # Проверяем, что БД отвечает
          mysql -h 127.0.0.1 -P 3306 -u app -ppass -e "SHOW TABLES;" app || echo "DB not ready yet"

      - name: Start SUT in background
        run: |
          java -jar ./artifacts/app-deadline.jar -P:jdbc.url=jdbc:mysql://localhost:3306/app -P:jdbc.user=app -P:jdbc.password=pass &
          echo "Waiting for SUT to start..."
          sleep 20

      - name: Check SUT is running
        run: |
          curl -v http://localhost:9999 || (echo "SUT failed to start" && exit 1)

      - name: Build with Gradle
        run: ./gradlew test --info -Dselenide.headless=true