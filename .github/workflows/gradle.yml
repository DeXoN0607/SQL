name: Java CI with Gradle

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: app
          MYSQL_USER: app
          MYSQL_PASSWORD: pass
        ports:
          - 3306:3306
        volumes:
          - ${{ github.workspace }}/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

    steps:
      - uses: actions/checkout@v2

      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: '11'
          distribution: 'adopt'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Waiting for container start
        run: sleep 30

      - name: Start SUT
        run: |
          java -jar ./artifacts/app-deadline.jar \
            -P:jdbc.url=jdbc:mysql://localhost:3306/app \
            -P:jdbc.user=app \
            -P:jdbc.password=pass &

      - name: Waiting for SUT start
        run: sleep 20

      - name: Build with Gradle
        run: ./gradlew test --info -Dselenide.headless=true